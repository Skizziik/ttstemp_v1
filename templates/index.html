<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>tinytts</title>
  <link rel="stylesheet" id="theme-link" href="/static/style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand">
        <div class="brand-text">
          <h1>tinytts</h1>
          <p class="subtitle">1.62M · 3.4MB · 44.1kHz · en</p>
        </div>
      </div>
      <div class="header-right">
        <div class="theme-toggle" id="theme-toggle" role="tablist" aria-label="Design">
          <button data-theme="studio" class="active" role="tab">studio</button>
          <button data-theme="classic" role="tab">classic</button>
        </div>
        <div class="status" id="status">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">loading</span>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="panel synth-panel">
        <div class="panel-header">
          <h2>Text</h2>
          <span class="char-count"><span id="char-count">0</span> / 2000</span>
        </div>

        <textarea
          id="text"
          placeholder="Type or paste English text here…"
          maxlength="2000"
          spellcheck="false"
        ></textarea>

        <div class="controls">
          <div class="control-group flex">
            <label>Speed <span class="value" id="speed-val">1.00×</span></label>
            <input type="range" id="speed" min="0.5" max="2.0" step="0.05" value="1.0" />
          </div>
        </div>

        <div class="actions">
          <button id="generate" class="btn-primary">
            <span class="btn-icon">▶</span>
            <span class="btn-label">Generate</span>
          </button>
          <button id="download" class="btn-secondary" disabled>
            <span class="btn-icon">↓</span>
            <span class="btn-label">Download WAV</span>
          </button>
          <div class="meta" id="meta"></div>
        </div>

        <div class="player" id="player" hidden>
          <audio id="audio" controls></audio>
        </div>
      </section>

      <section class="panel library-panel">
        <div class="panel-header">
          <h2>Text Library</h2>
          <input type="text" id="search" placeholder="Search…" />
        </div>
        <div class="categories" id="categories"></div>
        <div class="library" id="library"></div>
      </section>
    </main>

    <section class="panel camera-panel">
      <div class="panel-header">
        <h2>live narration</h2>
        <div class="camera-meta">
          <select id="cam-voice" class="select">
            <option value="baya" selected>baya (ж)</option>
            <option value="kseniya">kseniya (ж)</option>
            <option value="xenia">xenia (ж)</option>
            <option value="aidar">aidar (м)</option>
            <option value="eugene">eugene (м)</option>
          </select>
          <span id="cam-status" class="cam-status">idle</span>
        </div>
      </div>

      <div class="camera-body">
        <div class="video-wrap">
          <video id="cam-video" autoplay playsinline muted></video>
          <canvas id="cam-canvas" hidden></canvas>
          <div class="video-overlay" id="cam-overlay">camera off</div>
        </div>

        <div class="camera-side">
          <div class="caption-block">
            <div class="caption-label">ru</div>
            <p class="caption-ru" id="cap-ru">—</p>
            <div class="caption-label">en</div>
            <p class="caption-en" id="cap-en">—</p>
          </div>
          <audio id="cam-audio" hidden></audio>
          <div class="cam-actions">
            <button id="cam-start" class="btn-primary">
              <span class="btn-icon">●</span>
              <span class="btn-label">Start camera</span>
            </button>
            <span class="meta" id="cam-timing"></span>
          </div>
          <p class="cam-hint">Сразу один кадр → озвучка → ожидание 5 сек → следующий кадр. Цикл идёт пока не остановишь.</p>
        </div>
      </div>
    </section>

    <footer class="footer">
      <span>Built with <a href="https://github.com/tronghieuit/tiny-tts" target="_blank" rel="noopener">tiny-tts</a> · <a href="https://github.com/snakers4/silero-models" target="_blank" rel="noopener">silero</a> · BLIP · opus-mt</span>
    </footer>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/static/library.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
